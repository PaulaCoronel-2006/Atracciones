# ============================================================
# GitHub Actions — Build & Deploy Atracciones Coronel
# Construye imágenes Docker desde el monorepo y despliega
# en Azure Container Apps
# ============================================================
name: Deploy Atracciones Microservicios

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  ACR_LOGIN_SERVER: acratraccionescoronel.azurecr.io
  RESOURCE_GROUP:   rg-microclientes
  ACA_ENV:          aca-env-atracciones

jobs:
  # ──────────────────────────────────────────────────────────
  # JOB 1: Build y Push — IDENTIFY API
  # ──────────────────────────────────────────────────────────
  build-identify:
    name: Build identify-api
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo principal
        uses: actions/checkout@v4

      - name: Login ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build & Push identify-api
        uses: docker/build-push-action@v5
        with:
          context: ./Microservicios.Atracciones/Microservicios.Atracciones.Identify
          file: ./Microservicios.Atracciones/Microservicios.Atracciones.Identify/Dockerfile
          push: true
          tags: ${{ env.ACR_LOGIN_SERVER }}/identify-api:latest

  # ──────────────────────────────────────────────────────────
  # JOB 2: Build y Push — CATALOG API
  # ──────────────────────────────────────────────────────────
  build-catalog:
    name: Build catalog-api
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo principal
        uses: actions/checkout@v4

      - name: Login ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build & Push catalog-api
        uses: docker/build-push-action@v5
        with:
          context: ./Microservicios.Atracciones/Microservicios.Atracciones.Catalog
          file: ./Microservicios.Atracciones/Microservicios.Atracciones.Catalog/Dockerfile
          push: true
          tags: ${{ env.ACR_LOGIN_SERVER }}/catalog-api:latest

  # ──────────────────────────────────────────────────────────
  # JOB 3: Build y Push — BOOKING API
  # ──────────────────────────────────────────────────────────
  build-booking:
    name: Build booking-api
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo principal
        uses: actions/checkout@v4

      - name: Login ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build & Push booking-api
        uses: docker/build-push-action@v5
        with:
          context: ./Microservicios.Atracciones/Microservicios.Atracciones.Booking
          file: ./Microservicios.Atracciones/Microservicios.Atracciones.Booking/Dockerfile
          push: true
          tags: ${{ env.ACR_LOGIN_SERVER }}/booking-api:latest

  # ──────────────────────────────────────────────────────────
  # JOB 4: Build y Push — BILLING API
  # ──────────────────────────────────────────────────────────
  build-billing:
    name: Build billing-api
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo principal
        uses: actions/checkout@v4

      - name: Login ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build & Push billing-api
        uses: docker/build-push-action@v5
        with:
          context: ./Microservicios.Atracciones/Microservicios.Atracciones.Billing
          file: ./Microservicios.Atracciones/Microservicios.Atracciones.Billing/Dockerfile
          push: true
          tags: ${{ env.ACR_LOGIN_SERVER }}/billing-api:latest

  # ──────────────────────────────────────────────────────────
  # JOB 5: Build y Push — API GATEWAY
  # ──────────────────────────────────────────────────────────
  build-gateway:
    name: Build gateway-api
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo principal
        uses: actions/checkout@v4

      - name: Login ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build & Push gateway-api
        uses: docker/build-push-action@v5
        with:
          context: ./Microservicios.Atracciones/Microservicios.Atracciones.Gateway
          file: ./Microservicios.Atracciones/Microservicios.Atracciones.Gateway/Dockerfile
          push: true
          tags: ${{ env.ACR_LOGIN_SERVER }}/gateway-api:latest

  # ──────────────────────────────────────────────────────────
  # JOB 6: Build y Push — FRONTEND (NGINX)
  # ──────────────────────────────────────────────────────────
  build-frontend:
    name: Build frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo principal
        uses: actions/checkout@v4

      - name: Login ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build & Push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./Atracciones.Frontend
          file: ./Atracciones.Frontend/Dockerfile
          push: true
          tags: ${{ env.ACR_LOGIN_SERVER }}/frontend:latest

  # ──────────────────────────────────────────────────────────
  # JOB 7: Deploy en Azure Container Apps (espera todos)
  # ──────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Azure Container Apps
    runs-on: ubuntu-latest
    needs: [build-identify, build-catalog, build-booking, build-billing, build-gateway, build-frontend]
    steps:
      - name: Login Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Instalar extensión containerapp
        run: az extension add --name containerapp --upgrade --only-show-errors

      - name: Deploy identify-api (internal)
        run: |
          az containerapp create \
            --name identify-api \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --environment ${{ env.ACA_ENV }} \
            --image ${{ env.ACR_LOGIN_SERVER }}/identify-api:latest \
            --registry-server ${{ env.ACR_LOGIN_SERVER }} \
            --registry-username ${{ secrets.ACR_USERNAME }} \
            --registry-password ${{ secrets.ACR_PASSWORD }} \
            --target-port 80 --ingress internal \
            --min-replicas 1 --max-replicas 3 \
            --cpu 0.5 --memory 1.0Gi \
            --env-vars \
              "ASPNETCORE_ENVIRONMENT=Production" \
              "ASPNETCORE_URLS=http://+:80" \
              "ConnectionStrings__DefaultConnection=Host=aws-1-us-west-2.pooler.supabase.com;Port=6543;Database=postgres;Username=postgres.cdjwkanairobhsxodpnx;Password=${{ secrets.DB_PASSWORD_IDENTIFY }};SSL Mode=Require;Trust Server Certificate=true;" \
              "Jwt__Key=AtraccionesCoronelSuperSecretJWTKey2026MinimumLengthRequirementLongString!" \
              "Jwt__Issuer=Microservicios.Atracciones.Identify" \
              "Jwt__Audience=Microservicios.Atracciones.IdentifyUsers" \
              "Jwt__DurationMinutes=30" \
            --output none 2>/dev/null || \
          az containerapp update --name identify-api --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR_LOGIN_SERVER }}/identify-api:latest --output none

      - name: Deploy catalog-api (internal)
        run: |
          az containerapp create \
            --name catalog-api \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --environment ${{ env.ACA_ENV }} \
            --image ${{ env.ACR_LOGIN_SERVER }}/catalog-api:latest \
            --registry-server ${{ env.ACR_LOGIN_SERVER }} \
            --registry-username ${{ secrets.ACR_USERNAME }} \
            --registry-password ${{ secrets.ACR_PASSWORD }} \
            --target-port 80 --ingress internal \
            --min-replicas 1 --max-replicas 3 \
            --cpu 0.5 --memory 1.0Gi \
            --env-vars \
              "ASPNETCORE_ENVIRONMENT=Production" \
              "ASPNETCORE_URLS=http://+:80" \
              "ConnectionStrings__DefaultConnection=Host=aws-1-sa-east-1.pooler.supabase.com;Port=6543;Database=postgres;Username=postgres.kimthxyijmgfglyirded;Password=${{ secrets.DB_PASSWORD_CATALOG }};SSL Mode=Require;Trust Server Certificate=true;" \
              "Jwt__Key=AtraccionesCoronelSuperSecretJWTKey2026MinimumLengthRequirementLongString!" \
              "Jwt__Issuer=MicroserviciosAtraccionesCatalog" \
              "Jwt__Audience=MicroserviciosAtraccionesCatalogUsers" \
              "Jwt__DurationMinutes=30" \
            --output none 2>/dev/null || \
          az containerapp update --name catalog-api --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR_LOGIN_SERVER }}/catalog-api:latest --output none

      - name: Deploy booking-api (internal)
        run: |
          az containerapp create \
            --name booking-api \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --environment ${{ env.ACA_ENV }} \
            --image ${{ env.ACR_LOGIN_SERVER }}/booking-api:latest \
            --registry-server ${{ env.ACR_LOGIN_SERVER }} \
            --registry-username ${{ secrets.ACR_USERNAME }} \
            --registry-password ${{ secrets.ACR_PASSWORD }} \
            --target-port 80 --ingress internal \
            --min-replicas 1 --max-replicas 3 \
            --cpu 0.5 --memory 1.0Gi \
            --env-vars \
              "ASPNETCORE_ENVIRONMENT=Production" \
              "ASPNETCORE_URLS=http://+:80" \
              "ConnectionStrings__DefaultConnection=Host=aws-1-us-east-1.pooler.supabase.com;Port=6543;Database=postgres;Username=postgres.nnwzfvfhveoelyyrrplv;Password=${{ secrets.DB_PASSWORD_BOOKING }};SSL Mode=Require;Trust Server Certificate=true;" \
              "Jwt__Key=AtraccionesCoronelSuperSecretJWTKey2026MinimumLengthRequirementLongString!" \
              "Jwt__Issuer=ServicioAtraccion" \
              "Jwt__Audience=ServicioAtraccionUsers" \
              "Jwt__DurationMinutes=30" \
              "Services__CatalogUrl=http://catalog-api" \
              "Services__IdentifyUrl=http://identify-api" \
            --output none 2>/dev/null || \
          az containerapp update --name booking-api --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR_LOGIN_SERVER }}/booking-api:latest --output none

      - name: Deploy billing-api (internal)
        run: |
          az containerapp create \
            --name billing-api \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --environment ${{ env.ACA_ENV }} \
            --image ${{ env.ACR_LOGIN_SERVER }}/billing-api:latest \
            --registry-server ${{ env.ACR_LOGIN_SERVER }} \
            --registry-username ${{ secrets.ACR_USERNAME }} \
            --registry-password ${{ secrets.ACR_PASSWORD }} \
            --target-port 80 --ingress internal \
            --min-replicas 1 --max-replicas 3 \
            --cpu 0.5 --memory 1.0Gi \
            --env-vars \
              "ASPNETCORE_ENVIRONMENT=Production" \
              "ASPNETCORE_URLS=http://+:80" \
              "ConnectionStrings__DefaultConnection=Host=aws-1-us-west-1.pooler.supabase.com;Port=6543;Database=postgres;Username=postgres.hkjzvfcourzjyzxheran;Password=${{ secrets.DB_PASSWORD_BILLING }};SSL Mode=Require;Trust Server Certificate=true;" \
              "Jwt__Key=AtraccionesCoronelSuperSecretJWTKey2026MinimumLengthRequirementLongString!" \
              "Jwt__Issuer=BillingService" \
              "Jwt__Audience=BillingServiceUsers" \
              "Jwt__DurationMinutes=30" \
              "Billing__TaxRate=0.15" \
              "Services__BookingUrl=http://booking-api" \
              "Services__IdentifyUrl=http://identify-api" \
            --output none 2>/dev/null || \
          az containerapp update --name billing-api --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR_LOGIN_SERVER }}/billing-api:latest --output none

      - name: Deploy gateway-api (EXTERNAL)
        run: |
          az containerapp create \
            --name gateway-api \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --environment ${{ env.ACA_ENV }} \
            --image ${{ env.ACR_LOGIN_SERVER }}/gateway-api:latest \
            --registry-server ${{ env.ACR_LOGIN_SERVER }} \
            --registry-username ${{ secrets.ACR_USERNAME }} \
            --registry-password ${{ secrets.ACR_PASSWORD }} \
            --target-port 80 --ingress external \
            --min-replicas 1 --max-replicas 5 \
            --cpu 0.5 --memory 1.0Gi \
            --env-vars \
              "ASPNETCORE_ENVIRONMENT=Production" \
              "ASPNETCORE_URLS=http://+:80" \
              "ReverseProxy__Clusters__catalog-cluster__Destinations__catalog-api__Address=http://catalog-api" \
              "ReverseProxy__Clusters__booking-cluster__Destinations__booking-api__Address=http://booking-api" \
              "ReverseProxy__Clusters__billing-cluster__Destinations__billing-api__Address=http://billing-api" \
              "ReverseProxy__Clusters__identify-cluster__Destinations__identify-api__Address=http://identify-api" \
            --output none 2>/dev/null || \
          az containerapp update --name gateway-api --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR_LOGIN_SERVER }}/gateway-api:latest --output none

      - name: Deploy frontend (EXTERNAL)
        run: |
          az containerapp create \
            --name frontend \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --environment ${{ env.ACA_ENV }} \
            --image ${{ env.ACR_LOGIN_SERVER }}/frontend:latest \
            --registry-server ${{ env.ACR_LOGIN_SERVER }} \
            --registry-username ${{ secrets.ACR_USERNAME }} \
            --registry-password ${{ secrets.ACR_PASSWORD }} \
            --target-port 80 --ingress external \
            --min-replicas 1 --max-replicas 2 \
            --cpu 0.25 --memory 0.5Gi \
            --output none 2>/dev/null || \
          az containerapp update --name frontend --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR_LOGIN_SERVER }}/frontend:latest --output none

      - name: Obtener URL pública del Gateway y Frontend
        run: |
          GW_URL=$(az containerapp show \
            --name gateway-api \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" \
            --output tsv)
          FE_URL=$(az containerapp show \
            --name frontend \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" \
            --output tsv)
          echo "## ✅ DESPLIEGUE COMPLETADO" >> $GITHUB_STEP_SUMMARY
          echo "🌐 **Gateway URL:** https://$GW_URL" >> $GITHUB_STEP_SUMMARY
          echo "🖥️ **Frontend URL:** https://$FE_URL" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📡 Endpoints disponibles:" >> $GITHUB_STEP_SUMMARY
          echo "- \`GET  https://$GW_URL/health\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`*    https://$GW_URL/api/v1/coronel_paula/catalog/...\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`*    https://$GW_URL/api/v1/coronel_paula/booking/...\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`*    https://$GW_URL/api/v1/coronel_paula/billing/...\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`*    https://$GW_URL/api/v1/coronel_paula/...(identify)\`" >> $GITHUB_STEP_SUMMARY
          echo "🌐 GATEWAY URL: https://$GW_URL"
          echo "🖥️ FRONTEND URL: https://$FE_URL"
